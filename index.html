<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinWise — Smart Budget & Financial Literacy Assistant</title>
<meta name="description" content="FinWise helps students budget, track expenses, set savings goals, learn financial literacy, and stay safe from UPI scams." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --radius:0.85rem;
  --background:oklch(0.99 0.004 145);
  --foreground:oklch(0.24 0.04 250);
  --card:oklch(1 0 0);
  --card-foreground:oklch(0.24 0.04 250);
  --primary:oklch(0.63 0.16 153);
  --primary-foreground:oklch(0.99 0.01 145);
  --primary-glow:oklch(0.74 0.16 158);
  --navy:oklch(0.32 0.08 255);
  --navy-foreground:oklch(0.98 0.01 240);
  --secondary:oklch(0.95 0.02 160);
  --secondary-foreground:oklch(0.32 0.08 255);
  --muted:oklch(0.96 0.01 175);
  --muted-foreground:oklch(0.52 0.03 250);
  --accent:oklch(0.94 0.04 158);
  --accent-foreground:oklch(0.32 0.08 255);
  --destructive:oklch(0.58 0.22 27);
  --destructive-foreground:oklch(0.99 0.01 145);
  --success:oklch(0.63 0.16 153);
  --warning:oklch(0.78 0.15 75);
  --warning-foreground:oklch(0.27 0.05 70);
  --border:oklch(0.9 0.01 175);
  --input:oklch(0.9 0.01 175);
  --ring:oklch(0.63 0.16 153);
  --chart-1:oklch(0.63 0.16 153);
  --chart-2:oklch(0.32 0.08 255);
  --chart-3:oklch(0.7 0.15 200);
  --chart-4:oklch(0.78 0.15 75);
  --chart-5:oklch(0.6 0.2 320);
  --chart-6:oklch(0.65 0.18 35);
  --sidebar:oklch(0.99 0.006 160);
  --sidebar-border:oklch(0.9 0.01 175);
  --gradient-primary:linear-gradient(135deg,oklch(0.63 0.16 153),oklch(0.74 0.16 158));
  --gradient-hero:linear-gradient(150deg,oklch(0.32 0.08 255) 0%,oklch(0.4 0.1 220) 45%,oklch(0.63 0.16 153) 100%);
  --gradient-card:linear-gradient(160deg,color-mix(in oklab,var(--primary) 8%,var(--card)),var(--card));
  --shadow-sm:0 1px 2px oklch(0.32 0.08 255 / 0.06);
  --shadow-elegant:0 16px 40px -16px color-mix(in oklab,var(--navy) 30%,transparent);
  --shadow-glow:0 0 40px -8px color-mix(in oklab,var(--primary-glow) 55%,transparent);
}
.dark{
  --background:oklch(0.19 0.03 255);
  --foreground:oklch(0.95 0.01 175);
  --card:oklch(0.23 0.035 255);
  --card-foreground:oklch(0.95 0.01 175);
  --primary:oklch(0.7 0.16 156);
  --primary-foreground:oklch(0.19 0.03 255);
  --primary-glow:oklch(0.78 0.16 158);
  --navy:oklch(0.85 0.05 240);
  --navy-foreground:oklch(0.19 0.03 255);
  --secondary:oklch(0.28 0.04 255);
  --secondary-foreground:oklch(0.95 0.01 175);
  --muted:oklch(0.27 0.035 255);
  --muted-foreground:oklch(0.68 0.025 230);
  --accent:oklch(0.3 0.05 200);
  --accent-foreground:oklch(0.95 0.01 175);
  --destructive:oklch(0.65 0.2 25);
  --warning:oklch(0.8 0.15 75);
  --border:oklch(0.32 0.03 255);
  --input:oklch(0.32 0.03 255);
  --ring:oklch(0.7 0.16 156);
  --chart-1:oklch(0.72 0.16 156);
  --chart-2:oklch(0.7 0.12 240);
  --chart-3:oklch(0.75 0.14 200);
  --chart-4:oklch(0.8 0.15 75);
  --chart-5:oklch(0.7 0.18 320);
  --chart-6:oklch(0.72 0.16 35);
  --sidebar:oklch(0.21 0.03 255);
  --sidebar-border:oklch(0.32 0.03 255);
  --gradient-card:linear-gradient(160deg,color-mix(in oklab,var(--primary) 10%,var(--card)),var(--card));
  --shadow-elegant:0 16px 40px -16px oklch(0 0 0 / 0.55);
}
*{box-sizing:border-box;border-color:var(--border);margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--background);color:var(--foreground);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,.display{font-family:"Sora","Inter",sans-serif}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}
/* layout */
.container{max-width:1200px;margin:0 auto;padding:0 1.25rem}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:250px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--sidebar-border);position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s ease;z-index:40}
.sidebar-header{display:flex;align-items:center;gap:.6rem;padding:1.1rem 1rem}
.logo-badge{display:flex;height:38px;width:38px;align-items:center;justify-content:center;border-radius:12px;background:var(--gradient-primary);color:var(--primary-foreground);box-shadow:var(--shadow-glow);font-size:1.1rem}
.logo-text{font-family:"Sora";font-weight:800;font-size:1.2rem;letter-spacing:-.02em}
.logo-text span{color:var(--primary)}
.nav-group{padding:.4rem .6rem}
.nav-group-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-foreground);padding:.5rem .6rem .25rem}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.6rem .7rem;border-radius:10px;font-size:.9rem;font-weight:500;color:var(--foreground);transition:background .15s,color .15s}
.nav-item:hover{background:var(--accent);color:var(--accent-foreground)}
.nav-item.active{background:var(--primary);color:var(--primary-foreground);box-shadow:var(--shadow-sm)}
.nav-item .ico{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:1rem;margin-top:auto}
.tip-card{border-radius:12px;background:var(--gradient-card);padding:.8rem;font-size:.78rem;color:var(--muted-foreground)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:.5rem;height:64px;border-bottom:1px solid var(--border);background:color-mix(in oklab,var(--background) 80%,transparent);backdrop-filter:blur(10px);padding:0 1rem}
.content{flex:1;padding:1.25rem}
@media(min-width:1024px){.content{padding:2rem}}
.content-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border:none;border-radius:10px;font-size:.88rem;font-weight:600;padding:.55rem 1rem;background:var(--primary);color:var(--primary-foreground);transition:opacity .15s,background .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn-hero{background:var(--gradient-primary);box-shadow:var(--shadow-glow)}
.btn-navy{background:var(--navy);color:var(--navy-foreground)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--foreground)}
.btn-outline:hover{background:var(--accent);color:var(--accent-foreground);opacity:1}
.btn-ghost{background:transparent;color:var(--foreground)}
.btn-ghost:hover{background:var(--accent)}
.btn-destructive{background:var(--destructive);color:var(--destructive-foreground)}
.btn-sm{padding:.35rem .7rem;font-size:.8rem}
.btn-icon{padding:.5rem;width:40px;height:40px;border-radius:999px}
.btn-block{width:100%}
.btn-lg{padding:.8rem 1.6rem;font-size:1rem;border-radius:12px}
/* cards */
.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--card-foreground);box-shadow:var(--shadow-sm)}
.card-grad{background:var(--gradient-card)}
.card-head{padding:1.25rem 1.25rem .25rem}
.card-body{padding:1.25rem}
.card-title{font-weight:700;font-family:"Sora";font-size:1.05rem;letter-spacing:-.01em}
.card-desc{font-size:.85rem;color:var(--muted-foreground);margin-top:.2rem}
/* grid */
.grid{display:grid;gap:1rem}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g4,.g3,.g2{grid-template-columns:1fr}}
.span2{grid-column:span 2}
@media(max-width:640px){.span2{grid-column:span 1}}
/* stat card */
.stat{position:relative;overflow:hidden;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);padding:1.1rem}
.stat .label{font-size:.78rem;color:var(--muted-foreground);font-weight:500}
.stat .value{font-family:"Sora";font-size:1.6rem;font-weight:700;margin-top:.25rem;letter-spacing:-.02em}
.stat .ico-wrap{position:absolute;top:1rem;right:1rem;display:flex;height:40px;width:40px;align-items:center;justify-content:center;border-radius:12px}
.acc-primary .ico-wrap{background:color-mix(in oklab,var(--primary) 15%,transparent);color:var(--primary)}
.acc-navy .ico-wrap{background:color-mix(in oklab,var(--navy) 15%,transparent);color:var(--navy)}
.acc-destructive .ico-wrap{background:color-mix(in oklab,var(--destructive) 15%,transparent);color:var(--destructive)}
.acc-warning .ico-wrap{background:color-mix(in oklab,var(--warning) 18%,transparent);color:var(--warning)}
/* page header */
.page-head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:1rem}
.page-head h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em}
.page-head p{color:var(--muted-foreground);margin-top:.25rem;font-size:.92rem;max-width:60ch}
/* forms */
.field{display:flex;flex-direction:column;gap:.4rem}
.label{font-size:.82rem;font-weight:600}
.input,.select,.textarea{width:100%;border:1px solid var(--input);background:var(--background);border-radius:10px;padding:.55rem .7rem;font-size:.9rem;color:var(--foreground);transition:border .15s,box-shadow .15s}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in oklab,var(--ring) 25%,transparent)}
.input-icon{position:relative}
.input-icon .ico{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-foreground)}
.input-icon .input{padding-left:2.1rem}
/* badge */
.badge{display:inline-flex;align-items:center;gap:.35rem;border-radius:999px;padding:.2rem .6rem;font-size:.72rem;font-weight:600}
.badge-secondary{background:var(--secondary);color:var(--secondary-foreground)}
.badge-primary{background:color-mix(in oklab,var(--primary) 15%,transparent);color:var(--primary)}
.badge-warning{background:color-mix(in oklab,var(--warning) 20%,transparent);color:var(--warning-foreground)}
/* progress */
.progress{height:9px;border-radius:999px;background:var(--secondary);overflow:hidden}
.progress>div{height:100%;background:var(--primary);border-radius:999px;transition:width .4s ease}
.progress.over>div{background:var(--destructive)}
/* misc */
.muted{color:var(--muted-foreground)}
.row{display:flex;align-items:center;gap:.6rem}
.between{display:flex;align-items:center;justify-content:space-between;gap:.6rem;flex-wrap:wrap}
.stack{display:flex;flex-direction:column}
.gap-sm{gap:.5rem}.gap{gap:1rem}.gap-lg{gap:1.5rem}
.dot{height:11px;width:11px;border-radius:999px;flex-shrink:0}
.avatar{height:38px;width:38px;border-radius:999px;background:var(--gradient-primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;border:2px solid color-mix(in oklab,var(--primary) 30%,transparent);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.table{width:100%;border-collapse:collapse;font-size:.88rem}
.table th{text-align:left;padding:.6rem .5rem;color:var(--muted-foreground);font-weight:600;font-size:.78rem;border-bottom:1px solid var(--border)}
.table td{padding:.65rem .5rem;border-bottom:1px solid var(--border)}
.table tr:last-child td{border-bottom:none}
.icon-btn{background:transparent;border:none;color:var(--muted-foreground);padding:.3rem;border-radius:8px;display:inline-flex}
.icon-btn:hover{background:var(--accent);color:var(--foreground)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted-foreground)}
/* sidebar mobile */
.menu-btn,.overlay{display:none}
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-elegant)}
  .menu-btn{display:inline-flex}
  .overlay{display:none;position:fixed;inset:0;background:oklch(0 0 0 / .4);z-index:35}
  .overlay.show{display:block}
}
/* dropdown */
.dropdown{position:relative}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 8px);width:340px;max-width:90vw;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-elegant);z-index:50;overflow:hidden}
.notif-item{display:flex;gap:.7rem;padding:.8rem 1rem;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-dot{height:34px;width:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bell-badge{position:absolute;top:4px;right:4px;min-width:17px;height:17px;border-radius:999px;background:var(--destructive);color:var(--destructive-foreground);font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
/* toast */
#toasts{position:fixed;bottom:1.2rem;right:1.2rem;z-index:100;display:flex;flex-direction:column;gap:.6rem}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;padding:.7rem 1rem;box-shadow:var(--shadow-elegant);font-size:.88rem;min-width:220px;animation:slidein .25s ease}
.toast.err{border-left-color:var(--destructive)}
@keyframes slidein{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
/* landing */
.hero{position:relative;overflow:hidden;background:var(--gradient-hero);color:var(--primary-foreground)}
.hero-inner{position:relative;z-index:2;padding:5rem 0 6rem;text-align:center}
.hero h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:800;letter-spacing:-.03em;line-height:1.05}
.hero p{font-size:1.1rem;max-width:46ch;margin:1.2rem auto 2rem;opacity:.92}
.landing-nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 0}
.feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
@media(max-width:900px){.feature-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.feature-grid{grid-template-columns:1fr}}
.feat{border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;background:var(--gradient-card);transition:transform .2s,box-shadow .2s}
.feat:hover{transform:translateY(-4px);box-shadow:var(--shadow-elegant)}
.feat .ico-wrap{height:46px;width:46px;border-radius:12px;background:color-mix(in oklab,var(--primary) 14%,transparent);color:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:.9rem}
.section{padding:4rem 0}
.center{text-align:center}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;position:relative;overflow:hidden}
.auth-card{width:100%;max-width:420px}
.divider{display:flex;align-items:center;gap:.8rem;color:var(--muted-foreground);font-size:.78rem;margin:.4rem 0}
.divider:before,.divider:after{content:"";height:1px;flex:1;background:var(--border)}
.option-btn{display:flex;width:100%;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:left;font-weight:500;background:var(--card);transition:all .15s;color:var(--foreground)}
.option-btn:hover{border-color:var(--primary);background:var(--accent)}
.option-btn.correct{border-color:var(--primary);background:color-mix(in oklab,var(--primary) 12%,transparent)}
.option-btn.wrong{border-color:var(--destructive);background:color-mix(in oklab,var(--destructive) 12%,transparent)}
.option-btn:disabled{cursor:default}
.pill-toggle{display:inline-flex;background:var(--secondary);border-radius:999px;padding:3px}
.pill-toggle button{border:none;background:transparent;padding:.4rem .9rem;border-radius:999px;font-size:.82rem;font-weight:600;color:var(--muted-foreground)}
.pill-toggle button.active{background:var(--card);color:var(--foreground);box-shadow:var(--shadow-sm)}
.switch{position:relative;width:42px;height:24px;border-radius:999px;background:var(--input);border:none;transition:background .2s;flex-shrink:0}
.switch.on{background:var(--primary)}
.switch:after{content:"";position:absolute;top:3px;left:3px;height:18px;width:18px;border-radius:999px;background:#fff;transition:transform .2s}
.switch.on:after{transform:translateX(18px)}
.challenge-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
@media(max-width:520px){.challenge-grid{grid-template-columns:repeat(6,1fr)}}
.day-cell{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;cursor:pointer;color:var(--muted-foreground);transition:all .15s}
.day-cell:hover{border-color:var(--primary)}
.day-cell.done{background:var(--primary);color:var(--primary-foreground);border-color:var(--primary)}
.collapse-head{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;background:transparent;border:none;color:inherit}
.chev{transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.ring-wrap{position:relative;width:140px;height:140px;margin:0 auto}
.gauge-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-num .g{font-family:"Sora";font-size:2rem;font-weight:800}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="root"></div>
<div id="toasts"></div>
<script>
"use strict";
/* ============================ ICONS ============================ */
const I = {

  wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>',

  target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  grad:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg>',

/* ============================ INSIGHTS ============================ */
function computeHealth(){
  const income=Math.max(1,state.profile.monthlyIncome);
  const totalExp=D.totalExpenses(),totalSav=D.totalSavings();
  const saving=Math.round(Math.min(1,(totalSav/(income*6))/0.5)*25);
  const spending=Math.round(Math.max(0,1-Math.min(1,totalExp/income))*25);
  const totalBudget=D.totalBudget();
  const budget=totalBudget>0?Math.round(Math.max(0,1-Math.max(0,totalExp-totalBudget)/totalBudget)*20):6;
  const goalProgress=state.goals.length?state.goals.reduce((s,g)=>s+pct(g.current,g.target),0)/state.goals.length/100:0;
  const goalsScore=Math.round(goalProgress*15);
  const upi=Math.round(Math.min(1,state.scamHighScore/5)*15);
  const score=Math.min(100,saving+spending+budget+goalsScore+upi);
  const grade=score>=80?"A":score>=65?"B":score>=50?"C":"D";
  const summary=grade==="A"?"Excellent financial health.":grade==="B"?"Good, with a little room to grow.":grade==="C"?"Fair — a few habits need attention.":"Needs improvement — start with budgeting.";
  const breakdown=[{l:"Saving Habits",s:saving,m:25},{l:"Spending Control",s:spending,m:25},{l:"Budget Planning",s:budget,m:20},{l:"Goal Progress",s:goalsScore,m:15},{l:"UPI Safety Knowledge",s:upi,m:15}];
  const recs=[];
  if(saving<15)recs.push("Increase your monthly savings rate towards 20% of income.");
  if(spending<15)recs.push("Your spending is high relative to income — trim non-essentials.");
  if(budget<12)recs.push("Set a realistic budget for every category and stick to it.");
  if(goalsScore<8)recs.push("Add regular contributions to your savings goals.");
  if(upi<9)recs.push("Take the UPI Scam Simulator to sharpen fraud awareness.");
  if(!recs.length)recs.push("Great work! Keep your habits consistent.");
  return{score,grade,summary,breakdown,recs};
}
function detectLeaks(){
  const alerts=[];const sm=D.spentMap();
  for(const c of CATS){const amount=sm[c];const budget=state.budgets[c]||0;if(amount===0)continue;
    if(budget>0&&amount>budget){const over=amount-budget;
      alerts.push({category:c,amount,budget,message:`You spent ${fmt(amount)} on ${c}, ${fmt(over)} over budget.`,suggestion:suggestFor(c,over)});
    }else if(budget===0&&amount>state.profile.monthlyIncome*0.2){
      alerts.push({category:c,amount,budget,message:`${c} is a large untracked expense at ${fmt(amount)}.`,suggestion:`Set a budget for ${c} to keep it in check.`});}}
  return alerts.sort((a,b)=>b.amount-a.amount);
}
function suggestFor(c,over){const save=Math.max(200,Math.round(over/2/50)*50);
  switch(c){case"Food":return `Cook 2–3 more meals at home to save ~₹${save}.`;case"Shopping":return `Pause impulse buys for a week to recover ~₹${save}.`;case"Entertainment":return `Share subscriptions or pick free options to save ~₹${save}.`;case"Travel":return `Use public transport more often to save ~₹${save}.`;default:return `Trim ${c} spending to save ~₹${save}.`;}}

/* ============================ NOTIFICATIONS ============================ */
function buildNotifications(){
  if(!state)return[];const r=state.reminders;const list=[];const today=iso(new Date());
  if(r.expenseEnabled){const logged=state.expenses.some(e=>e.date===today);
    list.push({id:"exp",icon:"receipt",tone:"navy",title:"Log today's expenses",body:logged?"Nice! You've already logged an expense today.":`Don't forget to record today's spending. (Daily at ${r.expenseTime})`});}
  if(r.budgetEnabled){const sm=D.spentMap();const hit=CATS.filter(c=>{const b=state.budgets[c]||0;return b>0&&pct(sm[c],b)>=r.budgetThreshold;});
    if(hit.length)list.push({id:"bud",icon:"alert",tone:"destructive",title:"Budget limit reached",body:`${hit.join(", ")} crossed ${r.budgetThreshold}% of budget.`});
    else list.push({id:"bud",icon:"wallet",tone:"primary",title:"Budgets on track",body:`All categories are under ${r.budgetThreshold}% of budget.`});}
  if(r.goalEnabled&&state.goals.length){const g=state.goals[0];
    list.push({id:"goal",icon:"target",tone:"primary",title:"Savings goal reminder",body:`${g.name}: ${pct(g.current,g.target)}% there. Keep contributing (${r.goalFrequency}).`});}
  if(r.challengeEnabled){const left=30-state.challengeDays.length;
    list.push({id:"chal",icon:"trophy",tone:"warning",title:"Savings challenge",body:left>0?`${left} days left to complete the 30-Day Savings Challenge!`:"You completed the 30-Day Savings Challenge! 🏆"});}
  return list.filter(n=>!App.dismissed.includes(n.id));
}

function renderMenus(){
  const nm=document.getElementById("notif-menu");const pm=document.getElementById("profile-menu");if(!nm||!pm)return;
  const notifs=buildNotifications();
  const toneBg={navy:"color-mix(in oklab,var(--navy) 15%,transparent)",destructive:"color-mix(in oklab,var(--destructive) 15%,transparent)",primary:"color-mix(in oklab,var(--primary) 15%,transparent)",warning:"color-mix(in oklab,var(--warning) 20%,transparent)"};

  nm.innerHTML=App.notifOpen?`<div class="dropdown-menu" onclick="event.stopPropagation()">

  </div>`:"";
  pm.innerHTML=App.profileMenuOpen?`<div class="dropdown-menu" style="width:230px" onclick="event.stopPropagation()">
    <div style="padding:.9rem 1rem;border-bottom:1px solid var(--border)"><p style="font-weight:700">${esc(state.profile.name||"User")}</p><p class="muted" style="font-size:.8rem">${esc(currentAccount().email)}</p></div>

  if(App.profileMenuOpen){document.getElementById("logout-btn").onclick=logout;}

  const total=SCENARIOS.length;

      <h2 style="font-size:2rem;font-weight:800">${scam.score} / ${total}</h2>
      <p class="muted" style="max-width:40ch">${msg}</p>
      <button class="btn btn-hero" id="scam-restart">${ic("refresh")} Play Again</button>
    </div></div>`);
    document.getElementById("scam-restart").onclick=()=>{scam={idx:0,selected:null,score:0,done:false};renderPage("scam-simulator");};
    return;
  }

  <div class="card"><div class="card-head">

    <div class="card-title" style="padding-top:1rem;font-size:1.05rem;line-height:1.5">${cur.text}</div>
  </div><div class="card-body stack gap-sm">
    ${cur.options.map((o,i)=>{const isC=i===cur.correct;const chosen=scam.selected===i;let cls="option-btn";if(reveal&&isC)cls+=" correct";else if(reveal&&chosen)cls+=" wrong";return `<button class="${cls}" data-opt="${i}" ${reveal?"disabled":""}><span style="font-weight:600">${o}</span>${reveal&&isC?`<span style="color:var(--primary)">${I.check}</span>`:reveal&&chosen?`<span style="color:var(--destructive)">${I.x}</span>`:""}</button>`;}).join("")}
    ${reveal?`<div style="border-radius:12px;background:var(--secondary);padding:1rem"><p style="font-weight:700">${scam.selected===cur.correct?"✅ Correct!":"❌ Not safe."}</p><p class="muted" style="font-size:.88rem;margin-top:.3rem">${cur.explain}</p><button class="btn btn-hero" id="scam-next" style="margin-top:.8rem">${scam.idx+1>=total?"See Results":"Next Scenario"}</button></div>`:""}
  </div></div>`);
  document.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>{if(scam.selected!==null)return;scam.selected=+b.dataset.opt;if(scam.selected===cur.correct)scam.score++;renderPage("scam-simulator");});
  const nx=document.getElementById("scam-next");if(nx)nx.onclick=()=>{if(scam.idx+1>=total){if(scam.score>state.scamHighScore){state.scamHighScore=scam.score;persist();}scam.done=true;}else{scam.idx++;scam.selected=null;}renderPage("scam-simulator");bindShellBadge();};
}

/* ============================ PERSONALITY ============================ */
const PQ=[
  {q:"When you get money, you first...",a:[["Save a part","S"],["Plan a budget","P"],["Spend on what you want","D"]]},
  {q:"Your view on investing?",a:[["Love growing money","I"],["Cautious and steady","S"],["Go big or go home","R"]]},
  {q:"An unexpected ₹2000 appears. You...",a:[["Add to savings","S"],["Invest it","I"],["Treat yourself","D"]]},
  {q:"How do you track expenses?",a:[["Detailed app/sheet","P"],["Rough mental note","D"],["I review investments more","I"]]},
  {q:"A sale is on for a gadget you don't need.",a:[["Skip it","S"],["Check budget first","P"],["Buy it now","D"]]},
  {q:"Your ideal financial goal is...",a:[["Emergency fund","S"],["Steady wealth","I"],["Quick big returns","R"]]},
  {q:"Friends plan an expensive trip.",a:[["Save up first","P"],["Join immediately","D"],["Find a side income","I"]]},
  {q:"Risk tolerance?",a:[["Low — safety first","S"],["Medium — balanced","P"],["High — thrill seeker","R"]]},
  {q:"End of month, your wallet usually...",a:[["Has savings left","S"],["Is exactly on plan","P"],["Is empty","D"]]},
  {q:"Crypto / stocks make you feel...",a:[["Excited to invest","I"],["Curious but careful","P"],["Ready to gamble","R"]]},
  {q:"You hear of a hot new opportunity.",a:[["Research deeply","I"],["Ignore, too risky","S"],["Jump in fast","R"]]},
  {q:"Budgeting feels...",a:[["Essential","P"],["Boring","D"],["Useful for investing","I"]]},
  {q:"Your spending on wants is...",a:[["Minimal","S"],["Planned","P"],["Frequent","D"]]},
  {q:"Long-term, you want to...",a:[["Be financially secure","S"],["Build big wealth","I"],["Live large now","D"]]},
  {q:"A risky bet could double your money.",a:[["Pass","S"],["Invest a small part","I"],["All in!","R"]]},
];
const PRES={S:{title:"The Saver",desc:"You prioritise security and rarely overspend.",strengths:"Discipline, strong emergency fund, low debt.",weaknesses:"May miss growth by avoiding all risk.",tip:"Put some savings into low-risk investments to beat inflation."},P:{title:"The Planner",desc:"You budget carefully and love structure.",strengths:"Organised, goal-driven, balanced.",weaknesses:"Can over-plan and hesitate to act.",tip:"Automate your plan so good habits run on autopilot."},I:{title:"The Smart Investor",desc:"You make money work for you.",strengths:"Growth mindset, research-driven.",weaknesses:"May overlook short-term liquidity.",tip:"Keep 3–6 months of expenses liquid before investing more."},D:{title:"The Spender",desc:"You enjoy life and spend freely.",strengths:"Generous, experiences-focused.",weaknesses:"Low savings, impulse buys.",tip:"Pay yourself first — automate 20% to savings on payday."},R:{title:"The Risk Taker",desc:"You chase high returns and big bets.",strengths:"Bold, opportunity-seeking.",weaknesses:"Volatility, potential big losses.",tip:"Limit risky bets to money you can afford to lose."}};
let quiz={idx:0,scores:{S:0,P:0,I:0,D:0,R:0},done:false};
function Personality(){
  if(quiz.done){
    const top=Object.entries(quiz.scores).sort((a,b)=>b[1]-a[1])[0][0];const r=PRES[top];
    pageHTML(`${pageHead("Financial Personality Analyzer","Answer 15 questions to discover your money personality.")}
    <div class="card card-grad center"><div class="card-body stack gap" style="padding:2.5rem;align-items:center">
      <span class="logo-badge" style="height:64px;width:64px;font-size:1.8rem">${I.spark}</span>
      <h2 style="font-size:2rem;font-weight:800">${r.title}</h2>
      <p class="muted" style="max-width:40ch">${r.desc}</p>
      <div class="grid g3" style="max-width:640px;width:100%;text-align:left">
        <div style="border-radius:12px;background:color-mix(in oklab,var(--primary) 10%,transparent);padding:1rem"><p style="font-size:.72rem;font-weight:700;color:var(--primary)">Strengths</p><p style="font-size:.85rem;margin-top:.3rem">${r.strengths}</p></div>
        <div style="border-radius:12px;background:color-mix(in oklab,var(--destructive) 10%,transparent);padding:1rem"><p style="font-size:.72rem;font-weight:700;color:var(--destructive)">Weaknesses</p><p style="font-size:.85rem;margin-top:.3rem">${r.weaknesses}</p></div>
        <div style="border-radius:12px;background:color-mix(in oklab,var(--navy) 10%,transparent);padding:1rem"><p style="font-size:.72rem;font-weight:700;color:var(--navy)">Improve</p><p style="font-size:.85rem;margin-top:.3rem">${r.tip}</p></div>
      </div>
      <button class="btn btn-hero" id="quiz-restart">${ic("refresh")} Retake Quiz</button>
    </div></div>`);
    document.getElementById("quiz-restart").onclick=()=>{quiz={idx:0,scores:{S:0,P:0,I:0,D:0,R:0},done:false};renderPage("personality");};
    return;
  }
  const cur=PQ[quiz.idx];
  pageHTML(`${pageHead("Financial Personality Analyzer","Answer 15 questions to discover your money personality.")}
  <div class="card"><div class="card-head"><span class="badge badge-secondary">Question ${quiz.idx+1} / ${PQ.length}</span><div class="card-title" style="padding-top:.6rem;font-size:1.1rem">${cur.q}</div></div>
  <div class="card-body stack gap-sm">${cur.a.map((o,i)=>`<button class="option-btn" data-q="${i}" data-trait="${o[1]}">${o[0]}</button>`).join("")}</div></div>`);
  document.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{quiz.scores[b.dataset.trait]++;if(quiz.idx+1>=PQ.length)quiz.done=true;else quiz.idx++;renderPage("personality");});
}
